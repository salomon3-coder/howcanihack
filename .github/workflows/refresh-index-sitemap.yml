# One-click: dedupe articles.json + regenerate sitemap.xml (no API keys).
name: Refresh index and sitemap

on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dedupe articles.json and write sitemap.xml
        run: python scripts/refresh_index_and_sitemap.py

      - name: Commit and push
        run: |
          git config user.name "howcanihack-bot"
          git config user.email "bot@howcanihack.com"
          git add articles.json sitemap.xml
          git diff --staged --quiet || (git commit -m "chore: dedupe articles.json and refresh sitemap" && git push)
