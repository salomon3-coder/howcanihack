name: Auto-publish cybersecurity article

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of articles to generate'
        default: '1'
        required: false

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-slugify

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py ${{ github.event.inputs.count || '1' }}

      - name: Dedupe index and refresh sitemap
        run: python scripts/refresh_index_and_sitemap.py

      - name: Commit and push article
        run: |
          git config user.name "howcanihack-bot"
          git config user.email "bot@howcanihack.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto: new article $(date +'%Y-%m-%d')"
          git push
