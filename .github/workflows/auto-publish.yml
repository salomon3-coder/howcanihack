name: Auto-publish cybersecurity article

on:
  schedule:
    - cron: '0 8 * * *'  # Every day at 8am UTC (5am Chile)
  workflow_dispatch:      # Also allows manual trigger from GitHub UI

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-slugify

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_article.py

      - name: Commit and push article
        run: |
          git config user.name "howcanihack-bot"
          git config user.email "bot@howcanihack.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto: new article $(date +'%Y-%m-%d')"
          git push
