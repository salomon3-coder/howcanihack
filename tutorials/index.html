<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4579344894934796" crossorigin="anonymous"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutorials | HowCanIHack.com</title>
  <meta name="description" content="Cybersecurity tutorials for all levels. Learn ethical hacking, penetration testing, and more." />
  <link rel="canonical" href="https://howcanihack.com/tutorials/" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0a1628; --blue: #1d4ed8; --sky: #dbeafe;
      --gray50: #f8fafc; --gray200: #e2e8f0; --gray400: #94a3b8;
      --gray600: #475569; --text: #0f172a;
      --mono: 'JetBrains Mono', monospace;
      --serif: 'DM Serif Display', serif;
      --sans: 'DM Sans', sans-serif;
    }
    body { font-family: var(--sans); color: var(--text); background: #fff; }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray200);
      padding: 0 2rem; display: flex; align-items: center;
      justify-content: space-between; height: 64px;
    }
    .nav-logo { font-family: var(--mono); font-size: 1rem; font-weight: 600; color: var(--navy); text-decoration: none; }
    .nav-logo span { color: var(--blue); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--gray600); font-size: 0.875rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--blue); }
    @media (max-width: 768px) { .nav-links { display: none; } }
    .hero {
      background: var(--navy); padding: 4rem 2rem 3rem; text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(29,78,216,0.35), transparent 70%);
    }
    .hero-label { font-family: var(--mono); font-size: 0.75rem; color: #93c5fd; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 0.75rem; position: relative; }
    .hero h1 { font-family: var(--serif); font-size: clamp(2rem, 5vw, 3rem); color: #fff; position: relative; margin-bottom: 0.75rem; }
    .hero p { color: #94a3b8; font-size: 1rem; position: relative; }
    .container { max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; }
    .filters {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2.5rem;
    }
    .filter-btn {
      padding: 0.4rem 1rem; border-radius: 999px; border: 1.5px solid var(--gray200);
      background: #fff; font-family: var(--sans); font-size: 0.82rem; font-weight: 500;
      color: var(--gray600); cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--blue); background: var(--sky); color: var(--blue);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
    .card {
      display: block; text-decoration: none; color: inherit;
      background: #fff; border: 1.5px solid var(--gray200); border-radius: 12px;
      padding: 1.5rem; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { border-color: var(--blue); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(29,78,216,0.1); }
    .tag {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
      font-size: 0.7rem; font-weight: 600; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem;
    }
    .card h3 { font-family: var(--serif); font-size: 1.1rem; color: var(--navy); line-height: 1.35; margin-bottom: 0.6rem; }
    .card p { font-size: 0.82rem; color: var(--gray600); line-height: 1.6; margin-bottom: 0.75rem; }
    .card-date { font-family: var(--mono); font-size: 0.73rem; color: var(--gray400); }
    .empty { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--gray400); font-family: var(--mono); font-size: 0.85rem; }
    .count { font-family: var(--mono); font-size: 0.8rem; color: var(--gray400); margin-bottom: 1.5rem; }
    footer { background: var(--navy); color: #94a3b8; text-align: center; padding: 2rem; font-size: 0.82rem; }
    footer a { color: #94a3b8; text-decoration: none; }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><span>[</span>howcanihack<span>]</span></a>
  <ul class="nav-links">
    <li><a href="/tutorials/" class="active">Tutorials</a></li>
    <li><a href="/news/">News</a></li>
    <li><a href="/cve/">CVEs</a></li>
    <li><a href="/certifications/">Certifications</a></li>
    <li><a href="/tools/">Tools</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-label">Learn</div>
  <h1>Tutorials</h1>
  <p>Practical guides for every skill level</p>
</div>

<div class="container">
  <div class="filters" id="filters"></div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"><div class="empty">Loading...</div></div>
</div>

<footer>
  <p>© 2026 <a href="/">HowCanIHack.com</a> — For educational purposes only.</p>
</footer>

<script>
  const CATEGORY = 'tutorials';
  const ALL_CATS = ['tutorials', 'beginner'];
  const TAG_COLORS = {
    beginner:       { bg: '#dbeafe', color: '#1d4ed8' },
    tutorials:      { bg: '#dbeafe', color: '#1d4ed8' },
    tools:          { bg: '#fef3c7', color: '#d97706' },
    certifications: { bg: '#dcfce7', color: '#16a34a' },
    news:           { bg: '#fee2e2', color: '#dc2626' },
    cve:            { bg: '#f3e8ff', color: '#7c3aed' },
  };

  let articles = [];
  let activeFilter = 'all';

  function tagStyle(cat) {
    const c = TAG_COLORS[cat] || TAG_COLORS.tutorials;
    return `background:${c.bg};color:${c.color}`;
  }

  function renderGrid(items) {
    const grid = document.getElementById('grid');
    document.getElementById('count').textContent = items.length + ' article' + (items.length !== 1 ? 's' : '');
    if (!items.length) {
      grid.innerHTML = '<div class="empty">No articles yet — check back soon!</div>';
      return;
    }
    grid.innerHTML = items.map(a => `
      <a href="${a.url}" class="card">
        <span class="tag" style="${tagStyle(a.category)}">${a.category}</span>
        <h3>${a.title}</h3>
        <p>${a.description || ''}</p>
        <span class="card-date">${a.date || ''}</span>
      </a>`).join('');
  }

  function buildFilters(items) {
    const cats = [...new Set(items.map(a => a.category))];
    const wrap = document.getElementById('filters');
    wrap.innerHTML = `<button class="filter-btn active" onclick="filter('all',this)">All</button>` +
      cats.map(c => `<button class="filter-btn" onclick="filter('${c}',this)">${c}</button>`).join('');
  }

  function filter(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = cat;
    renderGrid(cat === 'all' ? articles : articles.filter(a => a.category === cat));
  }

  async function load() {
    try {
      const res = await fetch('/articles.json?v=' + Date.now());
      const all = await res.json();
      articles = all.filter(a => ALL_CATS.includes(a.category));
      buildFilters(articles);
      renderGrid(articles);
    } catch {
      document.getElementById('grid').innerHTML = '<div class="empty">No articles yet — check back soon!</div>';
    }
  }
  load();
</script>
</body>
</html>
